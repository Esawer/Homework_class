<div id="owner_options" class="col-span-3 row-span-4 relative hover:-translate-y-0.5 duration-500 delay-75 bg-linear-to-br from-violet-800 via-violet-800 to-indigo-900 text-white p-3 mt-6 mb-6 mr-6 rounded-2xl">


<div class="cursor-pointer flex justify-end items-end w-fit h-fit ml-auto" hx-get="{% url 'homeworks' class_name.id %}" 
   hx-select="#assignment_homworks_div"  
   hx-target="#owner_options"  
   hx-swap="outerHTML transition:true">
  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
  </svg>
</div>

{% if not locked_value %}
<form action="" method="POST" class="items-center justify-center flex flex-col ml-3 mt-5 pl-3 pr-3">
    {% csrf_token %}
    <p class="text-xl text-center mb-5 text-white">Change Class Name</p>
    <input type="text" value="{{class_name.name}}" name="change_class_name" class="px-3 bg-white dark:bg-slate-800 dark:border-slate-50 border-slate-300 rounded-xl p-2 text-base border h-fit w-9/10 text-slate-900 dark:text-slate-200" required></input>
    <button type="submit" class="mt-3 px-6 p-1  text-xl cursor-pointer hover:-translate-y-1 bg-linear-to-br from-white via-white to-white/70 dark:from-slate-800 dark:via-slate-800 dark:to-slate-800/70 shadow-violet-900/40 text-zinc-700 dark:text-slate-200 transition-all duration-500 delay-75 ease-out rounded-xl border border-white/10 dark:border-slate-700/50" name="submit" hx-post="{% url "owner_options" class_name.id %}">Change</button>
</form>
{% endif %}

<div class="mt-10  ml-3 shadow-violet-950/50 text-slate-900 flex justify-center items-center flex-col  align-middle p-3 rounded-2xl">
    <p class="text-xl text-center mb-5 text-white">Owner Actions</p>

<form action="" method="POST">
    {% csrf_token %}
    <button type="submit" class=" px-6 p-1 text-xl cursor-pointer hover:-translate-y-1 bg-linear-to-br from-yellow-600 via-yellow-600 to-yellow-950 dark:from-slate-800 dark:via-slate-800 dark:to-slate-800/70 shadow-violet-900/40 text-zinc-700 dark:text-slate-200 transition-all duration-500 delay-75 ease-out rounded-xl border border-white/10 dark:border-slate-700/50" name="lock_class" value="lock_class" hx-post="{% url "owner_options" class_name.id %}">{% if locked_value %} Unlock class {% else %} Lock class {% endif %}</button>
</form>
   
<form action="" method="POST">
    {% csrf_token %}
    <button type="submit" class="mt-3 px-6 p-1  text-xl cursor-pointer hover:-translate-y-1 bg-linear-to-br from-red-600 via-red-600 to-red-950 dark:from-slate-800 dark:via-slate-800 dark:to-slate-800/70 shadow-violet-900/40 text-zinc-700 dark:text-slate-200 transition-all duration-500 delay-75 ease-out rounded-xl border border-white/10 dark:border-slate-700/50" name="delete_class" value="delete_class" hx-post="{% url "owner_options" class_name.id %}">Delete Class</button>
</form>
</div>

</div>
